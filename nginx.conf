# ─── Clash of DSA — Production Nginx Reverse Proxy ────────────────────
# Place this in /etc/nginx/sites-available/ and symlink to sites-enabled.
# Replace YOUR_DOMAIN with your actual domain name.
# Generate SSL certs with: certbot --nginx -d YOUR_DOMAIN

# ─── Rate Limiting Zones ──────────────────────────────────────────────
# 10 requests/second per IP, burst allowed up to 20
limit_req_zone $binary_remote_addr zone=global:10m rate=10r/s;

# Max 50 concurrent connections per IP
limit_conn_zone $binary_remote_addr zone=addr:10m;

# Stricter zone for auth endpoints: 2 requests/second
limit_req_zone $binary_remote_addr zone=auth:10m rate=2r/s;

# ─── Upstream Servers ──────────────────────────────────────────────────
upstream nextjs {
    server 127.0.0.1:3000;
    keepalive 64;
}

upstream battleengine {
    server 127.0.0.1:4000;
    keepalive 64;
}

# ─── Redirect HTTP → HTTPS ────────────────────────────────────────────
server {
    listen 80;
    server_name YOUR_DOMAIN;
    return 301 https://$server_name$request_uri;
}

# ─── Main HTTPS Server ────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name YOUR_DOMAIN;

    # ── SSL (managed by certbot) ──────────────────────────────────────
    # ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # ── Global Limits ─────────────────────────────────────────────────
    client_max_body_size 10k;
    client_body_timeout 10s;
    client_header_timeout 10s;
    send_timeout 30s;
    proxy_read_timeout 30s;
    proxy_connect_timeout 5s;

    limit_conn addr 50;
    limit_req zone=global burst=20 nodelay;

    # ── Security Headers ──────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Auth API (stricter rate limit) ────────────────────────────────
    location /api/auth/ {
        limit_req zone=auth burst=5 nodelay;

        proxy_pass http://battleengine;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Battle Engine API ─────────────────────────────────────────────
    location /api/ {
        proxy_pass http://battleengine;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Socket.IO (WebSocket + polling) ───────────────────────────────
    location /socket.io/ {
        proxy_pass http://battleengine;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── Next.js Frontend ──────────────────────────────────────────────
    location / {
        proxy_pass http://nextjs;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Next.js Static Assets (long cache) ────────────────────────────
    location /_next/static/ {
        proxy_pass http://nextjs;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
